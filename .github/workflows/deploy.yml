name: UrbanEye Backend Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend   # Ensures we use the backend folder

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image (Backend)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/urbaneye-backend:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/urbaneye-backend:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/urbaneye-backend:latest

            # Stop and remove old container (if exists)
            docker stop urbaneye-backend || true
            docker rm urbaneye-backend || true

            # Run new container
            docker run -d \
              --name urbaneye-backend \
              -p 5001:5000 \
              --env-file /home/ec2-user/.env \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/urbaneye-backend:latest